name: Build Upstream Windows Binaries

on:
  # Allows you to trigger this manually whenever you want a fresh build
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      # 1. Checkout the UPSTREAM repository, not your fork's code
      - name: Checkout Upstream Code
        uses: actions/checkout@v4
        with:
          repository: yvgude/lean-ctx
          ref: main

      # 2. Setup the compiler environment
      - name: Install Rust (GNU Toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      # 3. Build the code
      - name: Build Release Binaries
        run: cargo build --release --target x86_64-pc-windows-gnu

      # 4. Zip and provide the download
      - name: Upload Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: lean-ctx-windows-exes
          path: target/x86_64-pc-windows-gnu/release/*.exe
