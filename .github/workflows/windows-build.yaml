name: Build Upstream Windows Binaries

on:
  workflow_dispatch: 

env:
  CARGO_TARGET_DIR: target

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Upstream Code
        uses: actions/checkout@v4
        with:
          repository: yvgude/lean-ctx
          ref: main

      # 1. Install MinGW-w64 toolchain for C dependencies (jemalloc)
      - name: Setup MSYS2 and MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: base-devel mingw-w64-x86_64-toolchain
          path-type: inherit

      # 2. Setup Rust for the GNU target
      - name: Install Rust (GNU Toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      # 3. Build all default features EXCEPT jemalloc (which needs Rust's alloc
      #    as a native static lib on mingw, but it's only shipped as .rlib).
      #    The Windows system allocator is perfectly adequate.
      - name: Build Release Binaries
        working-directory: rust
        shell: msys2 {0}
        run: |
          cargo build --release \
            --target x86_64-pc-windows-gnu \
            --no-default-features \
            --features "tree-sitter,embeddings,http-server,secure-update"

      # 4. Upload compiled binaries
      - name: Upload Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: lean-ctx-windows-exes
          path: rust/target/x86_64-pc-windows-gnu/release/*.exe
