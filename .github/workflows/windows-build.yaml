name: Build Upstream Windows Binaries

on:
  workflow_dispatch: 

env:
  CARGO_TARGET_DIR: target

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Upstream Code
        uses: actions/checkout@v4
        with:
          repository: yvgude/lean-ctx
          ref: main

      # 1. Install MinGW-w64 toolchain (needed for jemalloc's C build)
      - name: Setup MSYS2 and MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: base-devel mingw-w64-x86_64-toolchain
          path-type: inherit

      # 2. Setup Rust for the GNU target
      - name: Install Rust (GNU Toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      # 3. Build lean-ctx with jemalloc feature enabled.
      #    HACK: Override HOST env var so tikv-jemalloc-sys's build script
      #    passes --build=x86_64-w64-mingw32 (instead of x86_64-pc-win32 from
      #    the default MSVC host).  x86_64-w64-mingw32 is recognised by
      #    jemalloc's config.sub without any patching.
      #    Also create a dummy liballoc.a to satisfy the -lalloc linker flag
      #    that Rust emits when #[global_allocator] is used on this target.
      - name: Build Release Binaries (with jemalloc)
        working-directory: rust
        shell: msys2 {0}
        env:
          HOST: x86_64-pc-windows-gnu
        run: |
          # Dummy liballoc.a to satisfy -lalloc (real symbols from .rlib)
          mkdir -p /tmp/jemalloc-helper/lib
          printf 'void __dummy_alloc_ignore(void) {}\n' | \
            gcc -xc -c - -o /tmp/jemalloc-helper/lib/dummy.o
          ar crs /tmp/jemalloc-helper/lib/liballoc.a \
                /tmp/jemalloc-helper/lib/dummy.o
          rm -f /tmp/jemalloc-helper/lib/dummy.o

          export CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUSTFLAGS="-L $(cygpath -m /tmp/jemalloc-helper/lib)"
          cargo build --release --target x86_64-pc-windows-gnu

      # 4. Upload
      - name: Upload Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: lean-ctx-windows-exes
          path: rust/target/x86_64-pc-windows-gnu/release/*.exe
