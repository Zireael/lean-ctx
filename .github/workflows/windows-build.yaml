name: Build Upstream Windows Binaries

on:
  workflow_dispatch: 

env:
  CARGO_TARGET_DIR: target

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Upstream Code
        uses: actions/checkout@v4
        with:
          repository: yvgude/lean-ctx
          ref: main

      - name: Setup MSYS2 and MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: base-devel mingw-w64-x86_64-toolchain
          path-type: inherit

      - name: Install Rust (GNU Toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      # Build jemalloc from RELEASE TARBALL (git tag lacks generated configure)
      - name: Build jemalloc from source
        shell: msys2 {0}
        run: |
          set -eux
          curl -fsSL https://github.com/jemalloc/jemalloc/releases/download/5.3.0/jemalloc-5.3.0.tar.bz2 \
            -o /tmp/jemalloc.tar.bz2
          mkdir -p /tmp/jemalloc-build
          tar -xf /tmp/jemalloc.tar.bz2 -C /tmp/jemalloc-build --strip-components=1
          cd /tmp/jemalloc-build
          sed -i 's/^\tmingw32\* | mingw64\*/\tmingw32* | mingw64* | win32*/' build-aux/config.sub
          ./configure --host=x86_64-w64-mingw32 \
                      --disable-cxx --enable-shared=no \
                      --prefix=/tmp/jemalloc-prefix
          make -j$(nproc)
          make install_lib_static install_include
          ls -la /tmp/jemalloc-prefix/lib/

      # Build lean-ctx with jemalloc + dummy liballoc.a for -lalloc
      - name: Build Release Binaries (with jemalloc)
        working-directory: rust
        shell: msys2 {0}
        run: |
          set -eux

          # Verify the jemalloc lib exists at both path formats
          JEMALLOC_PATH=/tmp/jemalloc-prefix/lib/libjemalloc.a
          JEMALLOC_WIN=$(cygpath -w "$JEMALLOC_PATH")
          echo "MSYS2 path: $JEMALLOC_PATH"
          echo "Windows path: $JEMALLOC_WIN"
          ls -la "$JEMALLOC_PATH"

          # Dummy liballoc.a for -lalloc (real symbols from .rlib)
          mkdir -p /tmp/jemalloc-prefix/lib
          cd /tmp/jemalloc-prefix/lib
          printf 'void __dummy_alloc_ignore(void) {}\n' | \
            gcc -xc -c - -o dummy.o
          ar crs liballoc.a dummy.o
          rm -f dummy.o
          cd -

          DUMMY_DIR=$(cygpath -w /tmp/jemalloc-prefix/lib)

          # Use the Windows-native path (backslashes) for JEMALLOC_OVERRIDE
          # because the build script runs as a native Rust process
          export JEMALLOC_OVERRIDE="$JEMALLOC_WIN"
          export CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUSTFLAGS="-L $DUMMY_DIR"

          echo "JEMALLOC_OVERRIDE=$JEMALLOC_OVERRIDE"
          echo "RUSTFLAGS=$CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUSTFLAGS"

          cargo build --release --target x86_64-pc-windows-gnu

      - name: Upload Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: lean-ctx-windows-exes
          path: rust/target/x86_64-pc-windows-gnu/release/*.exe
