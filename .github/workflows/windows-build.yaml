name: Build Upstream Windows Binaries

on:
  workflow_dispatch: 

env:
  CARGO_TARGET_DIR: target

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Upstream Code
        uses: actions/checkout@v4
        with:
          repository: yvgude/lean-ctx
          ref: main

      # 1. Install MinGW-w64 toolchain (gcc needed by jemalloc)
      - name: Setup MSYS2 and MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: base-devel mingw-w64-x86_64-toolchain
          path-type: inherit

      # 2. Setup Rust for the GNU target
      - name: Install Rust (GNU Toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      # 3. Prepare patched jemalloc (config.sub doesn't know x86_64-pc-win32)
      - name: Prepare patched jemalloc
        shell: msys2 {0}
        run: |
          git clone --depth 1 --branch 5.3.0 https://github.com/jemalloc/jemalloc.git /tmp/jemalloc
          sed -i 's/^\tmingw32\* | mingw64\*/\tmingw32* | mingw64* | win32*/' /tmp/jemalloc/build-aux/config.sub

      # 4. Build - add Rust lib path so the linker can find -lalloc etc.
      - name: Build Release Binaries
        working-directory: rust
        shell: msys2 {0}
        env:
          JEMALLOC_OVERRIDE: /tmp/jemalloc
          RUSTFLAGS: -L $(rustc --print sysroot)/lib/rustlib/x86_64-pc-windows-gnu/lib
        run: cargo build --release --target x86_64-pc-windows-gnu

      # 5. Upload compiled binaries
      - name: Upload Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: lean-ctx-windows-exes
          path: rust/target/x86_64-pc-windows-gnu/release/*.exe
