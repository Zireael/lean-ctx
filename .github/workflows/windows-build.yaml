name: Build Upstream Windows Binaries

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Upstream Code
        uses: actions/checkout@v4
        with:
          repository: yvgude/lean-ctx
          ref: main

      # 1. Use the default MSVC Rust toolchain for Windows
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 2. Inject Visual Studio INCLUDE/LIB variables for the C compiler
      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      # 3. Build natively (dropping the GNU target flag)
      - name: Build Release Binaries
        working-directory: rust
        run: cargo build --release

      # 4. Upload from the standard release directory
      - name: Upload Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: lean-ctx-windows-exes
          path: rust/target/release/*.exe
