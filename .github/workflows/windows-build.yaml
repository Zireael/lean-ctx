name: Build Upstream Windows Binaries

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Upstream Code
        uses: actions/checkout@v4
        with:
          repository: yvgude/lean-ctx
          ref: main

      # 1. Install a complete, proper MinGW-w64 toolchain
      - name: Setup MSYS2 and MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # Installs the actual gcc, binutils, and make required by jemalloc
          install: base-devel mingw-w64-x86_64-toolchain
          # Inherits the Windows PATH so MSYS2 can find the rustup/cargo binaries
          path-type: inherit

      # 2. Setup Rust for the GNU target
      - name: Install Rust (GNU Toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      # 3. Build inside MSYS2 bash, with a known BUILD triple so jemalloc's
      #    bundled config.sub can validate it (MSYS2's config.guess returns
      #    x86_64-pc-win32 which jemalloc 5.3 does not recognise).
      - name: Build Release Binaries
        working-directory: rust
        shell: msys2 {0}
        env:
          BUILD: x86_64-w64-mingw32
        run: cargo build --release --target x86_64-pc-windows-gnu

      # 4. Zip and provide the download
      - name: Upload Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: lean-ctx-windows-exes
          path: rust/target/x86_64-pc-windows-gnu/release/*.exe
