name: Build Upstream Windows Binaries

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Upstream Code
        uses: actions/checkout@v4
        with:
          repository: yvgude/lean-ctx
          ref: main

      - name: Install Rust (GNU Toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      # Added working-directory to point to the rust subfolder
      - name: Build Release Binaries
        working-directory: rust
        run: cargo build --release --target x86_64-pc-windows-gnu

      # Updated the path to look inside the rust directory's target folder
      - name: Upload Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: lean-ctx-windows-exes
          path: rust/target/x86_64-pc-windows-gnu/release/*.exe
