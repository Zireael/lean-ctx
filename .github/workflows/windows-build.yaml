name: Build Upstream Windows Binaries

on:
  workflow_dispatch: 

env:
  CARGO_TARGET_DIR: target

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Upstream Code
        uses: actions/checkout@v4
        with:
          repository: yvgude/lean-ctx
          ref: main

      # 1. Install MinGW-w64 toolchain (needed for jemalloc's C build)
      - name: Setup MSYS2 and MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: base-devel mingw-w64-x86_64-toolchain
          path-type: inherit

      # 2. Setup Rust for the GNU target
      - name: Install Rust (GNU Toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      # 3. Build jemalloc 5.3.0 manually, then point JEMALLOC_OVERRIDE at it.
      #    This bypasses tikv-jemalloc-sys's configure which fails because
      #    --build=x86_64-pc-win32 (from the MSVC host, which cargo sets and
      #    we cannot override) isn't recognised by config.sub.
      - name: Build jemalloc from source
        shell: msys2 {0}
        run: |
          set -eux
          git clone --depth 1 --branch 5.3.0 \
            https://github.com/jemalloc/jemalloc.git /tmp/jemalloc-build
          cd /tmp/jemalloc-build
          # Patch config.sub for MSYS2's build triple
          sed -i 's/^\tmingw32\* | mingw64\*/\tmingw32* | mingw64* | win32*/' build-aux/config.sub
          ./configure --host=x86_64-w64-mingw32 \
                      --disable-cxx --enable-shared=no \
                      --prefix=/tmp/jemalloc-prefix
          make -j$(nproc)
          make install_lib_static install_include
          ls -la /tmp/jemalloc-prefix/lib/

      # 4. Build lean-ctx with jemalloc.
      #    Provide dummy liballoc.a alongside libjemalloc.a to satisfy -lalloc.
      - name: Build Release Binaries (with jemalloc)
        working-directory: rust
        shell: msys2 {0}
        run: |
          set -eux

          # Dummy liballoc.a for -lalloc linker flag (real symbols from .rlib)
          mkdir -p /tmp/jemalloc-prefix/lib
          printf 'void __dummy_alloc_ignore(void) {}\n' | \
            gcc -xc -c - -o /tmp/jemalloc-prefix/lib/dummy.o
          ar crs /tmp/jemalloc-prefix/lib/liballoc.a \
                /tmp/jemalloc-prefix/lib/dummy.o
          rm -f /tmp/jemalloc-prefix/lib/dummy.o

          JEMALLOC_A=$(cygpath -m /tmp/jemalloc-prefix/lib/libjemalloc.a)
          DUMMY_DIR=$(cygpath -m /tmp/jemalloc-prefix/lib)

          export JEMALLOC_OVERRIDE="$JEMALLOC_A"
          export CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUSTFLAGS="-L $DUMMY_DIR"

          cargo build --release --target x86_64-pc-windows-gnu

      # 5. Upload
      - name: Upload Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: lean-ctx-windows-exes
          path: rust/target/x86_64-pc-windows-gnu/release/*.exe
